<!DOCTYPE html>
<html>
    <head>
        <title>L2E Portal</title>
    </head>
    <body>
        <h1>Learn2Earn School Portal</h1>

        <form action="/" method="POST">
            <label for="full-name">Enter Name</label>
            <br>
            <input type="text" id="full-name" name="full-name" required>
            <br><br>
            <label for="email">Email</label>
            <br>
            <input type="email" id="email" name="email" required>
            <br><br>
            <label for="password">Password</label>
            <br>
            <input type="password" id="password" name="password" required>
            <br><br>
            <label for="age">Age</label>
            <br>
            <input type="number" id="age" name="age" required>
            <br><br>
            <label for="gender">Gender</label>
            <br>
            <p>
                <strong>Male</strong>
                <input type="radio" name="gender" value="male" id="gender">
                <strong>Female</strong>
                <input type="radio" name="gender" value="female" id="gender">
            </p>
            
            <label for="department"><strong>Choose Department</strong></label>
            <br>
            <select name="department" id="department">
                <option value="cybersecurity">Cybersecurity</option>
                <option value="full-stack">Full-Stack</option>
                <option value="devops">Devops</option>
                <option value="crypto-currency">Crypto-Currency</option>
                <option value="AI/ML">AI/ML</option>
                <option value="data science">Data Science</option>
            </select>
            <br><br>
            <label for="address">Address</label>
            <br>
            <textarea name="address" id="address" placeholder="Enter address.."></textarea>
            <br><br>
            <label for="T&C">T&C</label>
            <br>
            <input type="checkbox" name="T&C" id="T&C" required>
            <br><br>
            <button type="submit">Submit</button>
        </form>
    </body>
</html>
