<!DOCTYPE html>
<html>
    <head>
        <title>
            working with forms
        </title>
    </head>

    <body>
        <h1>Contact Forms</h1>

        <form>
            <label for="username">Name</label>
            <br>
            <input type="text" id="username" name="username" placeholder="enter username.." required>
            <br><br>

            <label for="email">Email</label>
            <br>
            <input type="email" id="email" name="email" placeholder="enter email" required>
            <br><br>
            <label for="password">Password</label>
            <br>
            <input type="password" id="password" name="password" placeholder="enter pin" required>
            <br><br>
            <label for="age">Age</label>
            <br>
            <input type="number" id="age" name="age" placeholder="enter age" required>
            <br><br>
            <label for="text">Address</label>
            <br>
            <textarea name="text" id="text" placeholder="enter text..."></textarea>
            <br><br>
            <label for="color">Color</label>
            <br>
            <input type="color" id="color" name="color" placeholder="choose color">
            <br><br>
            <label for="verified">Verify Age</label>
            <br>
            <input type="checkbox" name="verified" id="verified">
            <br><br>
            <button type="submit">Submit</button>
        </form>
    </body>
</html>
