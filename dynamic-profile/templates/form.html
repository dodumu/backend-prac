<!DOCTYPE html>
<html>

<head>
    <title>Student Form</title>
</head>

<body>

    <h1>Student Registration</h1>

    <form action="/" method="POST">

        <label for="name">Full Name</label>
        <br>
        <input
            type="text"
            id="name"
            name="name"
            required
        >

        <br><br>

        <label for="age">Age</label>
        <br>
        <input
            type="number"
            id="age"
            name="age"
            required
        >

        <br><br>
        <label for="email">Email</label>
        <br>
        <input 
            type="email" 
            name="email" 
            id="email" 
            required
        >
        <br><br>
        <label for="department">Department</label>
        <br>
        <input
            type="text"
            id="department"
            name="department"
            required
        >

        <br><br>

        <label for="language">Favorite Language</label>
        <br>
        <input
            type="text"
            id="language"
            name="language"
            required
        >

        <br><br>

        <button type="submit">Submit</button>

    </form>

</body>

</html>
